<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <!--
    Original Gond-style folk-art tile (inspired by traditional motifs, not a copy
    of any specific painting). Ink linework with muted colour fills and the
    signature rows of dots. Designed to tile seamlessly as a page background.
  -->
  <defs>
    <style>
      .ink   { fill: none; stroke: #2c2622; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .inkf  { fill: none; stroke: #2c2622; stroke-width: 1.5; stroke-linecap: round; }
      .d     { fill: #2c2622; }
      .dw    { fill: #f7f0e9; }
      .clay  { fill: #c1603d; }
      .rust  { fill: #9a3b2e; }
      .teal  { fill: #3f7d8c; }
      .blue  { fill: #4a6d8c; }
      .green { fill: #6f8f4f; }
      .olive { fill: #8a9a45; }
      .gold  { fill: #d9a441; }
    </style>
  </defs>

  <!-- ============================================================
       TREE OF LIFE (left)
       ============================================================ -->
  <g transform="translate(150,470)">
    <!-- trunk -->
    <path class="clay" d="M-12 300 C-14 200 -6 130 -10 40 C-4 36 4 36 10 40 C6 130 14 200 12 300 Z" stroke="#2c2622" stroke-width="2.4"/>
    <g class="dw">
      <circle cx="-4" cy="270" r="2.2"/><circle cx="4" cy="270" r="2.2"/>
      <circle cx="-4" cy="240" r="2.2"/><circle cx="4" cy="240" r="2.2"/>
      <circle cx="-4" cy="210" r="2.2"/><circle cx="4" cy="210" r="2.2"/>
      <circle cx="-4" cy="180" r="2.2"/><circle cx="4" cy="180" r="2.2"/>
      <circle cx="-4" cy="150" r="2.2"/><circle cx="4" cy="150" r="2.2"/>
      <circle cx="-4" cy="120" r="2.2"/><circle cx="4" cy="120" r="2.2"/>
      <circle cx="-4" cy="90" r="2.2"/><circle cx="4" cy="90" r="2.2"/>
    </g>
    <!-- branches -->
    <path class="ink" d="M0 40 C-60 20 -90 -30 -96 -90"/>
    <path class="ink" d="M0 40 C60 18 92 -34 98 -96"/>
    <path class="ink" d="M0 80 C-50 62 -78 26 -86 -18"/>
    <path class="ink" d="M0 80 C50 60 80 22 88 -22"/>
    <path class="ink" d="M0 10 C-40 -14 -58 -60 -60 -110"/>
    <path class="ink" d="M0 10 C40 -16 60 -62 62 -112"/>

    <!-- leaf clusters (paisley leaves) -->
    <g>
      <g transform="translate(-96,-90) rotate(-20)">
        <path class="green" d="M0 0 C18 -6 30 -20 26 -40 C10 -34 -2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M4 -6 C14 -14 20 -24 22 -34"/>
      </g>
      <g transform="translate(-60,-110) rotate(-8)">
        <path class="gold" d="M0 0 C18 -6 30 -20 26 -40 C10 -34 -2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M4 -6 C14 -14 20 -24 22 -34"/>
      </g>
      <g transform="translate(62,-112) rotate(10)">
        <path class="teal" d="M0 0 C-18 -6 -30 -20 -26 -40 C-10 -34 2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M-4 -6 C-14 -14 -20 -24 -22 -34"/>
      </g>
      <g transform="translate(98,-96) rotate(22)">
        <path class="olive" d="M0 0 C-18 -6 -30 -20 -26 -40 C-10 -34 2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M-4 -6 C-14 -14 -20 -24 -22 -34"/>
      </g>
      <g transform="translate(-86,-18) rotate(-40)">
        <path class="clay" d="M0 0 C18 -6 30 -20 26 -40 C10 -34 -2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M4 -6 C14 -14 20 -24 22 -34"/>
      </g>
      <g transform="translate(88,-22) rotate(40)">
        <path class="blue" d="M0 0 C-18 -6 -30 -20 -26 -40 C-10 -34 2 -20 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M-4 -6 C-14 -14 -20 -24 -22 -34"/>
      </g>
      <g transform="translate(-30,-140) rotate(-4)">
        <path class="rust" d="M0 0 C16 -6 26 -18 22 -36 C8 -30 -2 -18 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M4 -6 C12 -14 18 -22 20 -30"/>
      </g>
      <g transform="translate(30,-142) rotate(4)">
        <path class="green" d="M0 0 C-16 -6 -26 -18 -22 -36 C-8 -30 2 -18 0 0 Z" stroke="#2c2622" stroke-width="1.6"/>
        <path class="inkf" d="M-4 -6 C-12 -14 -18 -22 -20 -30"/>
      </g>
    </g>

    <!-- roots dot bed -->
    <g class="d">
      <circle cx="-40" cy="300" r="2.4"/><circle cx="-20" cy="306" r="2.4"/>
      <circle cx="0" cy="300" r="2.4"/><circle cx="20" cy="306" r="2.4"/>
      <circle cx="40" cy="300" r="2.4"/>
    </g>
  </g>

  <!-- ============================================================
       PEACOCK (top-right)
       ============================================================ -->
  <g transform="translate(650,180)">
    <path class="teal" d="M0 40 C-22 40 -36 22 -34 0 C-32 -20 -12 -30 6 -22 C20 -16 24 2 18 18 Z" stroke="#2c2622" stroke-width="2.2"/>
    <circle class="teal" cx="-32" cy="-6" r="11" stroke="#2c2622" stroke-width="2.2"/>
    <path class="ink" d="M-42 -8 l-14 -5"/>
    <path class="clay" d="M-56 -13 l10 3 l-10 5 Z" stroke="#2c2622" stroke-width="1.4"/>
    <path class="inkf" d="M-32 -17 l-3 -15"/>
    <circle class="clay" cx="-35" cy="-34" r="3.5" stroke="#2c2622" stroke-width="1.2"/>
    <circle class="d" cx="-29" cy="-7" r="2.4"/>
    <g>
      <path class="ink" d="M12 14 C52 6 86 30 116 8"/>
      <path class="ink" d="M12 26 C54 30 90 54 122 42"/>
      <path class="ink" d="M8 38 C48 52 78 82 114 78"/>
      <path class="ink" d="M4 30 C40 40 66 66 96 66"/>
      <circle class="gold" cx="116" cy="8" r="8" stroke="#2c2622" stroke-width="1.6"/><circle class="rust" cx="116" cy="8" r="3"/>
      <circle class="gold" cx="122" cy="42" r="8" stroke="#2c2622" stroke-width="1.6"/><circle class="rust" cx="122" cy="42" r="3"/>
      <circle class="gold" cx="114" cy="78" r="8" stroke="#2c2622" stroke-width="1.6"/><circle class="rust" cx="114" cy="78" r="3"/>
      <circle class="gold" cx="96" cy="66" r="7" stroke="#2c2622" stroke-width="1.6"/><circle class="rust" cx="96" cy="66" r="2.6"/>
    </g>
    <g class="dw">
      <circle cx="-16" cy="10" r="2"/><circle cx="-4" cy="18" r="2"/>
      <circle cx="-18" cy="26" r="2"/><circle cx="2" cy="4" r="2"/>
      <circle cx="-8" cy="-4" r="2"/>
    </g>
  </g>

  <!-- ============================================================
       FISH SCHOOL (bottom-right)
       ============================================================ -->
  <g transform="translate(640,650)">
    <g>
      <path class="rust" d="M-60 0 C-24 -34 34 -34 66 0 C34 34 -24 34 -60 0 Z" stroke="#2c2622" stroke-width="2.2"/>
      <path class="clay" d="M66 0 l30 -20 l0 40 Z" stroke="#2c2622" stroke-width="2"/>
      <circle class="dw" cx="-34" cy="-6" r="4"/><circle class="d" cx="-34" cy="-6" r="1.8"/>
      <g class="dw">
        <circle cx="-16" cy="-6" r="2"/><circle cx="0" cy="-10" r="2"/><circle cx="16" cy="-8" r="2"/><circle cx="34" cy="-4" r="2"/>
        <circle cx="-10" cy="6" r="2"/><circle cx="6" cy="8" r="2"/><circle cx="24" cy="6" r="2"/>
        <circle cx="-24" cy="2" r="2"/>
      </g>
    </g>
    <g>
      <g transform="translate(-70,50) scale(0.5)">
        <path class="blue" d="M-40 0 C-16 -24 24 -24 48 0 C24 24 -16 24 -40 0 Z" stroke="#2c2622" stroke-width="3"/>
        <path class="blue" d="M48 0 l20 -14 l0 28 Z" stroke="#2c2622" stroke-width="3"/>
        <circle class="dw" cx="-22" cy="-4" r="4"/>
      </g>
      <g transform="translate(-10,66) scale(0.5)">
        <path class="teal" d="M-40 0 C-16 -24 24 -24 48 0 C24 24 -16 24 -40 0 Z" stroke="#2c2622" stroke-width="3"/>
        <path class="teal" d="M48 0 l20 -14 l0 28 Z" stroke="#2c2622" stroke-width="3"/>
        <circle class="dw" cx="-22" cy="-4" r="4"/>
      </g>
      <g transform="translate(52,54) scale(0.5)">
        <path class="blue" d="M-40 0 C-16 -24 24 -24 48 0 C24 24 -16 24 -40 0 Z" stroke="#2c2622" stroke-width="3"/>
        <path class="blue" d="M48 0 l20 -14 l0 28 Z" stroke="#2c2622" stroke-width="3"/>
        <circle class="dw" cx="-22" cy="-4" r="4"/>
      </g>
    </g>
  </g>

  <!-- ============================================================
       DEER (bottom-left)
       ============================================================ -->
  <g transform="translate(230,720)">
    <path class="blue" d="M-56 30 C-58 6 -40 -6 -14 -6 C10 -6 34 0 54 -8 C58 8 52 26 40 34 C10 40 -30 40 -56 30 Z" stroke="#2c2622" stroke-width="2.4"/>
    <path class="ink" d="M-46 34 l-4 40"/>
    <path class="ink" d="M-20 38 l-2 40"/>
    <path class="ink" d="M22 38 l2 40"/>
    <path class="ink" d="M44 32 l6 42"/>
    <path class="blue" d="M54 -8 C70 -18 76 -40 70 -60 C66 -68 74 -74 82 -72 C88 -66 86 -56 80 -54 C86 -46 84 -34 74 -26 Z" stroke="#2c2622" stroke-width="2.2"/>
    <path class="clay" d="M70 -60 l-10 -22 M70 -60 l8 -24" stroke="#2c2622" stroke-width="2" fill="none"/>
    <path class="inkf" d="M60 -82 l-8 -8 M60 -82 l-2 -12 M78 -84 l8 -6 M78 -84 l2 -12"/>
    <circle class="d" cx="76" cy="-58" r="2.2"/>
    <g class="dw">
      <circle cx="-36" cy="10" r="2.2"/><circle cx="-18" cy="6" r="2.2"/><circle cx="0" cy="8" r="2.2"/>
      <circle cx="18" cy="6" r="2.2"/><circle cx="36" cy="10" r="2.2"/>
      <circle cx="-26" cy="22" r="2.2"/><circle cx="-6" cy="20" r="2.2"/><circle cx="14" cy="22" r="2.2"/><circle cx="32" cy="22" r="2.2"/>
    </g>
    <path class="green" d="M-70 74 C-74 54 -66 40 -60 30 C-54 42 -50 56 -56 74 Z" stroke="#2c2622" stroke-width="1.6"/>
  </g>

  <!-- ============================================================
       SUN (center-top) + connective dots
       ============================================================ -->
  <g transform="translate(450,110)">
    <circle class="gold" cx="0" cy="0" r="26" stroke="#2c2622" stroke-width="2.2"/>
    <circle class="rust" cx="0" cy="0" r="12" stroke="#2c2622" stroke-width="1.6"/>
    <g class="inkf">
      <path d="M0 -26 l0 -16"/><path d="M0 26 l0 16"/><path d="M-26 0 l-16 0"/><path d="M26 0 l16 0"/>
      <path d="M-18 -18 l-11 -11"/><path d="M18 -18 l11 -11"/><path d="M-18 18 l-11 11"/><path d="M18 18 l11 11"/>
    </g>
    <g class="clay">
      <circle cx="0" cy="-44" r="2.4"/><circle cx="0" cy="44" r="2.4"/><circle cx="-44" cy="0" r="2.4"/><circle cx="44" cy="0" r="2.4"/>
    </g>
  </g>

  <g class="d">
    <circle cx="450" cy="450" r="2"/><circle cx="420" cy="480" r="1.6"/><circle cx="480" cy="470" r="1.6"/>
    <circle cx="380" cy="300" r="1.6"/><circle cx="540" cy="420" r="1.6"/><circle cx="330" cy="560" r="1.6"/>
  </g>
</svg>
